<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mol - ヴェネツィア AR</title>
  <link rel="stylesheet" type="text/css" href="index.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script defer src="index.js"></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
</head>
<body>
  <div id="ar-page">
    <button class="ar-back" type="button" aria-label="戻る">
      <span class="ar-back__icon" aria-hidden="true"></span>
      <span>BACK</span>
    </button>
    <figure class="ar-viewport">
      <div class="ar-loading" role="status" aria-live="polite">
        <div class="ar-loading__panel">
          <span class="ar-loading__eyebrow">AR - 拡張現実</span>
          <p class="ar-loading__title">3Dモデルを読み込んでいます</p>
          <div class="ar-loading__progress" aria-hidden="true">
            <span class="ar-loading__bar"></span>
          </div>
          <p class="ar-loading__value">0%</p>
        </div>
      </div>
      <model-viewer class="ar-model" poster="venice.png" src="venice.glb" ios-src="venice.usdz" ar ar-modes="quick-look scene-viewer webxr" auto-rotate camera-controls reveal="auto" alt="Venice">
        <button class="ar-launch" slot="ar-button" type="button" aria-label="ARで表示する">
          <span class="ar-launch__badge" aria-hidden="true">
            <svg class="ar-launch__icon" viewBox="0 0 48 48" role="img" aria-hidden="true">
              <path d="M16 8H10a2 2 0 0 0-2 2v6" />
              <path d="M32 8h6a2 2 0 0 1 2 2v6" />
              <path d="M40 32v6a2 2 0 0 1-2 2h-6" />
              <path d="M16 40h-6a2 2 0 0 1-2-2v-6" />
              <path d="m24 15 8 4.5v9L24 33l-8-4.5v-9Z" />
              <path d="m24 15-8 4.5 8 4.5 8-4.5" />
              <path d="M24 24v9" />
            </svg>
          </span>
          <span class="ar-launch__label">
            <strong>ARで表示する</strong>
            <small>実物大で部屋に置いてみる</small>
          </span>
        </button>
      </model-viewer>
      <aside class="ar-qr" aria-label="スマートフォン向けAR案内">
        <div class="ar-qr__copy">
          <span class="ar-qr__eyebrow">AR - 拡張現実</span>
          <p class="ar-qr__title">スマホで読み取ってAR表示</p>
          <p class="ar-qr__text">このページをスマートフォンで開くと、実物大で空間に配置できます。</p>
        </div>
        <div class="ar-qr__code" aria-hidden="true"></div>
      </aside>
    </figure>
  </div>
</body>
</html>
